<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Ejercicios de Función Exponencial | Academia CienciaPlus</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #0B1120 0%, #111827 100%);
            color: #F3F4F6;
            overflow: hidden;
            height: 100vh;
        }
        .app-container { display: flex; height: 100vh; flex-direction: row; }
        .indicators-panel {
            width: 100px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border-right: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 10px;
            overflow-y: auto;
            z-index: 50;
        }
        .indicators-title { font-size: 0.8rem; color: #94A3B8; margin-bottom: 20px; text-align: center; }
        .indicators-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; }
        .indicator {
            width: 45px; height: 45px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 1rem; cursor: pointer;
            transition: all 0.2s; background: #F59E0B; color: #1E293B;
        }
        .indicator.answered { background: #3B82F6; color: white; }
        .indicator:hover { transform: scale(1.1); box-shadow: 0 0 0 2px rgba(59,130,246,0.5); }
        .slides-container { flex: 1; height: 100vh; overflow-y: auto; scroll-behavior: smooth; scroll-snap-type: y mandatory; }
        .slide { scroll-snap-align: start; min-height: 100vh; width: 100%; display: flex; align-items: center; justify-content: center; padding: 60px 40px; }
        .question-card {
            max-width: 900px; width: 100%; background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px); border-radius: 48px; padding: 40px;
            border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 25px 45px -12px rgba(0,0,0,0.4);
            animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .question-text { font-size: 1.4rem; font-weight: 500; margin-bottom: 30px; line-height: 1.5; color: #F1F5F9; }
        .options { display: flex; flex-direction: column; gap: 14px; margin-bottom: 30px; }
        .option { display: flex; align-items: center; gap: 15px; padding: 12px 20px; background: #1E293B; border-radius: 60px; border: 1px solid #334155; cursor: pointer; transition: all 0.2s; }
        .option:hover { background: #334155; border-color: #3B82F6; }
        .option input { width: 20px; height: 20px; cursor: pointer; accent-color: #3B82F6; }
        .option label { flex: 1; cursor: pointer; font-size: 1rem; color: #CBD5E1; }
        .slide-number { text-align: center; margin-top: 20px; color: #6B7280; font-size: 0.85rem; }
        .nav-btn {
            position: fixed; top: 50%; transform: translateY(-50%);
            background: rgba(30, 41, 59, 0.9); backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.2); border-radius: 60px;
            padding: 14px 18px; cursor: pointer; z-index: 200;
            transition: all 0.2s; color: white; font-size: 1.3rem;
        }
        .nav-btn:hover { background: #3B82F6; transform: translateY(-50%) scale(1.05); }
        .nav-left { left: 120px; }
        .nav-right { right: 30px; }
        .fixed-buttons {
            position: fixed; bottom: 24px; right: 24px;
            display: flex; gap: 12px; z-index: 300;
        }
        .fixed-btn {
            background: linear-gradient(135deg, #1E293B, #0F172A);
            backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.15);
            padding: 12px 20px; border-radius: 50px; color: #E2E8F0;
            text-decoration: none; font-weight: 600; font-size: 0.85rem;
            display: flex; align-items: center; gap: 8px; transition: all 0.3s;
            cursor: pointer;
        }
        .fixed-btn:hover { transform: translateY(-3px); background: linear-gradient(135deg, #3B82F6, #2563EB); color: white; }
        .finish-btn { background: linear-gradient(135deg, #F59E0B, #D97706); }
        .finish-btn:hover { background: linear-gradient(135deg, #FBBF24, #F59E0B); }
        .results-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 1000; overflow-y: auto;
            padding: 40px 20px; display: none;
        }
        .results-container { max-width: 1000px; margin: 0 auto; background: #1E293B; border-radius: 48px; padding: 40px; }
        .results-container h2 { color: #FCD34D; margin-bottom: 20px; }
        .score-box { background: #0F172A; padding: 20px; border-radius: 24px; text-align: center; margin-bottom: 30px; }
        .score-box h3 { font-size: 2rem; color: #60A5FA; }
        .result-question { background: #0F172A; border-radius: 20px; padding: 20px; margin-bottom: 20px; border-left: 5px solid; }
        .result-question.correct { border-left-color: #10B981; }
        .result-question.incorrect { border-left-color: #EF4444; }
        .explanation { margin-top: 12px; padding: 12px; background: #1E293B; border-radius: 12px; font-size: 0.9rem; color: #FBBF24; }
        .action-buttons { display: flex; gap: 15px; justify-content: center; margin-top: 30px; flex-wrap: wrap; }
        .action-btn { padding: 12px 24px; border-radius: 50px; font-weight: 600; cursor: pointer; transition: all 0.3s; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; border: none; }
        .restart-btn { background: #10B981; color: white; }
        .restart-btn:hover { background: #059669; transform: scale(1.02); }
        .math-btn { background: #3B82F6; color: white; }
        .math-btn:hover { background: #2563EB; transform: scale(1.02); }
        .exponencial-btn { background: #8B5CF6; color: white; }
        .exponencial-btn:hover { background: #7C3AED; transform: scale(1.02); }
        @media (max-width: 768px) {
            .indicators-panel { width: 70px; }
            .indicator { width: 35px; height: 35px; font-size: 0.8rem; }
            .nav-left { left: 85px; }
            .question-card { padding: 25px; }
            .question-text { font-size: 1.1rem; }
        }
        .katex-display { overflow-x: auto; overflow-y: hidden; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="indicators-panel">
            <div class="indicators-title">Preguntas</div>
            <div class="indicators-grid" id="indicatorsGrid"></div>
        </div>
        <div class="slides-container" id="slidesContainer"></div>
    </div>

    <div class="nav-btn nav-left" id="prevBtn"><i class="fas fa-chevron-left"></i></div>
    <div class="nav-btn nav-right" id="nextBtn"><i class="fas fa-chevron-right"></i></div>
    <div class="fixed-buttons">
        <a href="matematicas.html" class="fixed-btn"><i class="fas fa-arrow-left"></i> Matemáticas</a>
        <div class="fixed-btn finish-btn" id="finishBtn"><i class="fas fa-check-circle"></i> Finalizar</div>
    </div>

    <div class="results-overlay" id="resultsOverlay">
        <div class="results-container" id="resultsContainer"></div>
    </div>

    <script>
        function renderKatexInElement(element) {
            if (typeof renderMathInElement !== 'undefined') {
                renderMathInElement(element, {
                    delimiters: [
                        {left: '$$', right: '$$', display: true},
                        {left: '$', right: '$', display: false}
                    ]
                });
            }
        }

        // ============================================
        // POOL DE 100 PREGUNTAS SOBRE FUNCIÓN EXPONENCIAL
        // ============================================
        const questionPool = [
            // ============================================
            // 50 PREGUNTAS FÁCILES
            // ============================================
            
            // Evaluación de funciones básicas
            { text: "Si $f(x) = 2^x$, ¿cuál es el valor de $f(3)$?", options: ["6", "$2^3$", "9", "$2^2$", "10"], correct: 1, explanation: "$f(3) = 2^3 = 8$" },
            { text: "Si $f(x) = 3^x$, ¿cuál es el valor de $f(2)$?", options: ["6", "$2^3$", "$3^2$", "12", "27"], correct: 2, explanation: "$f(2) = 3^2 = 9$" },
            { text: "Si $f(x) = 5^x$, ¿cuál es el valor de $f(1)$?", options: ["1", "5", "$5^1$", "$5^2$", "0"], correct: 2, explanation: "$f(1) = 5^1 = 5$" },
            { text: "Si $f(x) = 10^x$, ¿cuál es el valor de $f(0)$?", options: ["0", "$10^0$", "10", "$10^2$", "2"], correct: 1, explanation: "$f(0) = 10^0 = 1$" },
            { text: "Si $f(x) = \\left(\\frac{1}{2}\\right)^x$, ¿cuál es el valor de $f(1)$?", options: ["2", "1", "$2^{-1}$", "$2^{-2}$", "$\\frac{3}{2}$"], correct: 2, explanation: "$f(1) = \\left(\\frac{1}{2}\\right)^1 = 2^{-1}$" },
            { text: "Si $f(x) = 4^x$, ¿cuál es el valor de $f(2)$?", options: ["$2^3$", "12", "$4^2$", "$2^5$", "$4^3$"], correct: 2, explanation: "$f(2) = 4^2 = 16$" },
            { text: "Si $f(x) = 2^x$, ¿cuál es el valor de $f(4)$?", options: ["$2^2$", "12", "$2^4$", "$2^5$", "$4^2$"], correct: 2, explanation: "$f(4) = 2^4 = 16$" },
            { text: "Si $f(x) = 3^x$, ¿cuál es el valor de $f(3)$?", options: ["$3^2$", "$3^4$", "$3^3$", "$9^2$", "$3^5$"], correct: 2, explanation: "$f(3) = 3^3 = 27$" },
            { text: "Si $f(x) = \\left(\\frac{1}{3}\\right)^x$, ¿cuál es el valor de $f(2)$?", options: ["$3^{-1}$", "$3^{-2}$", "$3^{-3}$", "$3^{2}$", "$3^{1}$"], correct: 1, explanation: "$f(2) = \\left(\\frac{1}{3}\\right)^2 = 3^{-2}$" },
            { text: "Si $f(x) = 6^x$, ¿cuál es el valor de $f(0)$?", options: ["0", "$6^0$", "$6^1$", "$6^2$", "12"], correct: 1, explanation: "$f(0) = 6^0 = 1$" },

            // Expresiones que representan la función (crecimiento)
            { text: "Una población se duplica cada 2 horas. ¿Cuál función representa esta situación si $x$ son horas?", options: ["$f(x) = 2 \\cdot 2^x$", "$f(x) = 2^{2x}$", "$f(x) = 2^{x/2}$", "$f(x) = 2^{2x}$", "$f(x) = 2^{x}$"], correct: 2, explanation: "Se duplica cada 2 horas: $k=2$, $c=1/2$, base $b=2$. La función es $f(x)=a \\cdot 2^{x/2}$" },
            { text: "Una bacteria se triplica cada 4 horas. ¿Cuál función representa esta situación?", options: ["$f(x) = 3^{4x}$", "$f(x) = 3^{x/4}$", "$f(x) = 4^{3x}$", "$f(x) = 4^{x/3}$", "$f(x) = 3^{x}$"], correct: 1, explanation: "Se triplica cada 4 horas: $k=4$, $c=1/4$, base $b=3$. Función: $f(x)=a \\cdot 3^{x/4}$" },
            { text: "Un cultivo se cuadruplica cada 3 horas. ¿Cuál función representa esta situación?", options: ["$f(x) = 4^{3x}$", "$f(x) = 4^{x/3}$", "$f(x) = 3^{4x}$", "$f(x) = 3^{x/4}$", "$f(x) = 4^{x}$"], correct: 1, explanation: "Se cuadruplica cada 3 horas: $k=3$, $c=1/3$, base $b=4$. Función: $f(x)=a \\cdot 4^{x/3}$" },
            { text: "Una población aumenta un 20% cada año. ¿Cuál función representa esta situación?", options: ["$f(x) = (0,2)^x$", "$f(x) = (1,2)^x$", "$f(x) = (0,8)^x$", "$f(x) = 1,2x$", "$f(x) = 20^x$"], correct: 1, explanation: "Aumentar un 20% significa multiplicar por $1,2$ cada año" },
            { text: "Una inversión crece un 5% anual. ¿Cuál función representa el crecimiento del capital?", options: ["$f(x) = (1,05)^x$", "$f(x) = (0,95)^x$", "$f(x) = 5^x$", "$f(x) = (1,5)^x$", "$f(x) = 1,05x$"], correct: 0, explanation: "Crecer un 5% significa multiplicar por $1,05$ cada año" },
            { text: "Una sustancia se reduce a la mitad cada 8 horas. ¿Cuál función representa esta situación?", options: ["$f(x) = 2^{x/8}$", "$f(x) = (1/2)^{x/8}$", "$f(x) = 2^{8x}$", "$f(x) = (1/2)^{8x}$", "$f(x) = (0,5)^x$"], correct: 1, explanation: "Se reduce a la mitad cada 8 horas: $k=8$, $c=1/8$, base $b=1/2$. Función: $f(x)=a \\cdot (1/2)^{x/8}$" },
            { text: "Un material radiactivo pierde el 10% de su masa cada año. ¿Cuál función representa esta situación?", options: ["$f(x) = (1,1)^x$", "$f(x) = (0,9)^x$", "$f(x) = (0,1)^x$", "$f(x) = 10^x$", "$f(x) = (1,9)^x$"], correct: 1, explanation: "Pierde 10% significa que queda $90\\% = 0,9$ cada año" },
            { text: "Una población de bacterias se quintuplica cada 2 horas. ¿Cuál función representa esta situación?", options: ["$f(x) = 5^{2x}$", "$f(x) = 5^{x/2}$", "$f(x) = 2^{5x}$", "$f(x) = 2^{x/5}$", "$f(x) = 5^{x}$"], correct: 1, explanation: "Se quintuplica cada 2 horas: $k=2$, $c=1/2$, base $b=5$. Función: $f(x)=a \\cdot 5^{x/2}$" },
            { text: "Un automóvil pierde el 15% de su valor cada año. ¿Cuál función representa la depreciación?", options: ["$f(x) = (1,15)^x$", "$f(x) = (0,85)^x$", "$f(x) = (0,15)^x$", "$f(x) = (1,85)^x$", "$f(x) = 15^x$"], correct: 1, explanation: "Pierde 15% significa que queda $85\\% = 0,85$ cada año" },
            { text: "Una población se reduce a la tercera parte cada 5 años. ¿Cuál función representa esta situación?", options: ["$f(x) = 3^{x/5}$", "$f(x) = (1/3)^{x/5}$", "$f(x) = 5^{x/3}$", "$f(x) = (1/5)^{x/3}$", "$f(x) = 3^{5x}$"], correct: 1, explanation: "Se reduce a la tercera parte cada 5 años: $k=5$, $c=1/5$, base $b=1/3$. Función: $f(x)=a \\cdot (1/3)^{x/5}$" },

            // Evaluación en contextos simples
            { text: "Una población de 100 bacterias se duplica cada hora. ¿Cuántas bacterias habrá después de 3 horas?", options: ["300", "$100 \\cdot 2^3$", "$100 \\cdot 2^2$", "$100 \\cdot 2^1$", "$100 \\cdot 2^0$"], correct: 1, explanation: "$f(3) = 100 \\cdot 2^3$" },
            { text: "Un capital de \$10.000 aumenta un 10% cada año. ¿Cuánto se tendrá después de 2 años?", options: ["\$10.000 \\cdot (1,1)^2$", "\$10.000 \\cdot (1,1)^1$", "\$10.000 \\cdot (1,1)^3$", "\$10.000 \\cdot (1,1)^0$", "\$10.000 \\cdot 2$"], correct: 0, explanation: "$f(2) = 10.000 \\cdot (1,1)^2$" },
            { text: "Una sustancia de 200 mg se reduce a la mitad cada 4 horas. ¿Cuántos mg quedan después de 8 horas?", options: ["$200 \\cdot 2^{-1}$", "$200 \\cdot 2^{-2}$", "$200 \\cdot 2^{-3}$", "$200 \\cdot 2^{-4}$", "$200 \\cdot 2^{0}$"], correct: 1, explanation: "$f(8) = 200 \\cdot (1/2)^{8/4} = 200 \\cdot (1/2)^2 = 200 \\cdot 2^{-2}$" },
            { text: "Un cultivo de 500 bacterias se triplica cada 2 horas. ¿Cuántas bacterias habrá después de 4 horas?", options: ["$500 \\cdot 3^1$", "$500 \\cdot 3^2$", "$500 \\cdot 3^3$", "$500 \\cdot 3^4$", "$500 \\cdot 3^0$"], correct: 1, explanation: "$f(4) = 500 \\cdot 3^{4/2} = 500 \\cdot 3^2$" },
            { text: "Una inversión de \$5.000 crece un 8% anual. ¿Cuánto tendrá después de 3 años?", options: ["$5.000 \\cdot (1,08)^2$", "$5.000 \\cdot (1,08)^3$", "$5.000 \\cdot (1,08)^4$", "$5.000 \\cdot (1,08)^1$", "$5.000 \\cdot (1,08)^0$"], correct: 1, explanation: "$f(3) = 5.000 \\cdot (1,08)^3$" },
            { text: "Una población de 1.000 peces se reduce un 5% cada año. ¿Cuántos peces quedan después de 2 años?", options: ["$1.000 \\cdot (0,95)^1$", "$1.000 \\cdot (0,95)^2$", "$1.000 \\cdot (0,95)^3$", "$1.000 \\cdot (0,95)^0$", "$1.000 \\cdot (0,95)^4$"], correct: 1, explanation: "$f(2) = 1.000 \\cdot (0,95)^2$" },
            { text: "Una bacteria se duplica cada 30 minutos. Si hay 50 bacterias inicialmente, ¿cuántas habrá en 2 horas?", options: ["$50 \\cdot 2^2$", "$50 \\cdot 2^3$", "$50 \\cdot 2^4$", "$50 \\cdot 2^5$", "$50 \\cdot 2^1$"], correct: 2, explanation: "2 horas = 4 períodos. $f(4) = 50 \\cdot 2^4$" },
            { text: "Un medicamento de 300 mg se reduce un 20% cada hora. ¿Cuántos mg quedan después de 2 horas?", options: ["$300 \\cdot (0,8)^1$", "$300 \\cdot (0,8)^2$", "$300 \\cdot (0,8)^3$", "$300 \\cdot (0,8)^4$", "$300 \\cdot (0,8)^0$"], correct: 1, explanation: "$f(2) = 300 \\cdot (0,8)^2$" },
            { text: "Una población de 2.000 habitantes crece un 3% anual. ¿Cuántos habitantes habrá después de 3 años?", options: ["$2.000 \\cdot (1,03)^2$", "$2.000 \\cdot (1,03)^3$", "$2.000 \\cdot (1,03)^4$", "$2.000 \\cdot (1,03)^1$", "$2.000 \\cdot (1,03)^0$"], correct: 1, explanation: "$f(3) = 2.000 \\cdot (1,03)^3$" },
            { text: "Una sustancia radiactiva de 80 gramos se reduce a la mitad cada 100 años. ¿Cuántos gramos quedan después de 300 años?", options: ["$80 \\cdot 2^{-1}$", "$80 \\cdot 2^{-2}$", "$80 \\cdot 2^{-3}$", "$80 \\cdot 2^{-4}$", "$80 \\cdot 2^{0}$"], correct: 2, explanation: "$f(300) = 80 \\cdot (1/2)^{300/100} = 80 \\cdot (1/2)^3 = 80 \\cdot 2^{-3}$" },

            // Más evaluaciones fáciles
            { text: "Si $f(x) = 2^x$, ¿cuál es el valor de $f(5)$?", options: ["$2^4$", "$2^5$", "$2^6$", "$2^3$", "$2^2$"], correct: 1, explanation: "$f(5) = 2^5$" },
            { text: "Si $f(x) = (1/4)^x$, ¿cuál es el valor de $f(2)$?", options: ["$4^{-1}$", "$4^{-2}$", "$4^{-3}$", "$4^{2}$", "$4^{1}$"], correct: 1, explanation: "$f(2) = (1/4)^2 = 4^{-2}$" },
            { text: "Una población se duplica cada 5 años. ¿Cuál función representa esta situación?", options: ["$f(x) = 2^{5x}$", "$f(x) = 2^{x/5}$", "$f(x) = 5^{2x}$", "$f(x) = 5^{x/2}$", "$f(x) = 2^{x}$"], correct: 1, explanation: "Se duplica cada 5 años: $k=5$, $c=1/5$, base $b=2$. Función: $f(x)=a \\cdot 2^{x/5}$" },
            { text: "Una inversión crece un 12% anual. ¿Cuál función representa el crecimiento?", options: ["$f(x) = (0,12)^x$", "$f(x) = (1,12)^x$", "$f(x) = 12^x$", "$f(x) = 1,12x$", "$f(x) = (0,88)^x$"], correct: 1, explanation: "Crecer un 12% significa multiplicar por $1,12$ cada año" },
            { text: "Un cultivo de 300 bacterias se cuadruplica cada 2 horas. ¿Cuántas bacterias habrá después de 6 horas?", options: ["$300 \\cdot 4^2$", "$300 \\cdot 4^3$", "$300 \\cdot 4^4$", "$300 \\cdot 4^1$", "$300 \\cdot 4^0$"], correct: 1, explanation: "$f(6) = 300 \\cdot 4^{6/2} = 300 \\cdot 4^3$" },
            { text: "Un automóvil de \$15.000 pierde el 10% de su valor cada año. ¿Cuánto valdrá después de 3 años?", options: ["$15.000 \\cdot (0,9)^2$", "$15.000 \\cdot (0,9)^3$", "$15.000 \\cdot (0,9)^4$", "$15.000 \\cdot (0,9)^1$", "$15.000 \\cdot (0,9)^0$"], correct: 1, explanation: "$f(3) = 15.000 \\cdot (0,9)^3$" },
            { text: "Una población de 500 conejos aumenta un 20% cada año. ¿Cuántos conejos habrá después de 2 años?", options: ["$500 \\cdot (1,2)^1$", "$500 \\cdot (1,2)^2$", "$500 \\cdot (1,2)^3$", "$500 \\cdot (1,2)^4$", "$500 \\cdot (1,2)^0$"], correct: 1, explanation: "$f(2) = 500 \\cdot (1,2)^2$" },
            { text: "Si $f(x) = 2^{x}$, ¿cuál es el valor de $f(-1)$?", options: ["$2^1$", "$2^0$", "$2^{-1}$", "$2^{-2}$", "$2^{-3}$"], correct: 2, explanation: "$f(-1) = 2^{-1}$" },
            { text: "Una sustancia se reduce a la cuarta parte cada 6 horas. ¿Cuál función representa esta situación?", options: ["$f(x) = 4^{x/6}$", "$f(x) = (1/4)^{x/6}$", "$f(x) = 6^{x/4}$", "$f(x) = (1/6)^{x/4}$", "$f(x) = 4^{6x}$"], correct: 1, explanation: "Se reduce a la cuarta parte cada 6 horas: $k=6$, $c=1/6$, base $b=1/4$. Función: $f(x)=a \\cdot (1/4)^{x/6}$" },
            { text: "Un capital de \$20.000 aumenta un 7% anual. ¿Cuánto tendrá después de 2 años?", options: ["$20.000 \\cdot (1,07)^1$", "$20.000 \\cdot (1,07)^2$", "$20.000 \\cdot (1,07)^3$", "$20.000 \\cdot (1,07)^4$", "$20.000 \\cdot (1,07)^0$"], correct: 1, explanation: "$f(2) = 20.000 \\cdot (1,07)^2$" },

            // ============================================
            // 50 PREGUNTAS MEDIANAMENTE DIFÍCILES
            // ============================================
            
            { text: "Una población de 100 bacterias se duplica cada 3 horas. ¿Cuál de las siguientes funciones representa correctamente esta situación?", options: ["$f(x)=100 \\cdot 2^{3x}$", "$f(x)=100 \\cdot 3^{2x}$", "$f(x)=100 \\cdot 2^{x/3}$", "$f(x)=100 \\cdot 3^{x/2}$", "$f(x)=100 \\cdot 2^{x}$"], correct: 2, explanation: "Se duplica cada 3 horas: $k=3$, $c=1/3$, base $b=2$. Función: $f(x)=100 \\cdot 2^{x/3}$" },

            { text: "Si $f(x) = 3^{2x}$, ¿cuál es el valor de $f(2)$?", options: ["$3^2$", "$3^4$", "$3^6$", "$3^8$", "$3^{10}$"], correct: 1, explanation: "$f(2) = 3^{2 \\cdot 2} = 3^4$" },
            { text: "Una población de 600 bacterias se cuadruplica cada 5 horas. ¿Cuántas bacterias habrá después de 10 horas?", options: ["$600 \\cdot 4^1$", "$600 \\cdot 4^2$", "$600 \\cdot 4^3$", "$600 \\cdot 4^4$", "$600 \\cdot 4^0$"], correct: 1, explanation: "$f(10) = 600 \\cdot 4^{10/5} = 600 \\cdot 4^2$" },
            { text: "Una inversión de \$30.000 aumenta un 11% anual. ¿Cuánto tendrá después de 4 años?", options: ["$30.000 \\cdot (1,11)^3$", "$30.000 \\cdot (1,11)^4$", "$30.000 \\cdot (1,11)^5$", "$30.000 \\cdot (1,11)^2$", "$30.000 \\cdot (1,11)^1$"], correct: 1, explanation: "$f(4) = 30.000 \\cdot (1,11)^4$" },
            { text: "Un medicamento se reduce un 40% cada hora. Si se administran 500 mg, ¿cuántos mg quedan después de 3 horas?", options: ["$500 \\cdot (0,6)^2$", "$500 \\cdot (0,6)^3$", "$500 \\cdot (0,6)^4$", "$500 \\cdot (0,6)^1$", "$500 \\cdot (0,6)^0$"], correct: 1, explanation: "$f(3) = 500 \\cdot (0,6)^3$" },
            { text: "Una población de 2.000 habitantes crece un 2,5% anual. ¿Cuántos habitantes habrá después de 5 años?", options: ["$2.000 \\cdot (1,025)^4$", "$2.000 \\cdot (1,025)^5$", "$2.000 \\cdot (1,025)^6$", "$2.000 \\cdot (1,025)^3$", "$2.000 \\cdot (1,025)^2$"], correct: 1, explanation: "$f(5) = 2.000 \\cdot (1,025)^5$" },
            { text: "Una bacteria se triplica cada 20 minutos. Si hay 15 bacterias a las 10:00 AM, ¿cuántas habrá a las 11:00 AM?", options: ["$15 \\cdot 3^2$", "$15 \\cdot 3^3$", "$15 \\cdot 3^4$", "$15 \\cdot 3^1$", "$15 \\cdot 3^0$"], correct: 1, explanation: "1 hora = 60 min = 3 períodos. $f(3) = 15 \\cdot 3^3$" },
            { text: "Una sustancia pierde el 18% de su masa cada año. ¿Qué fracción de la masa original queda después de 3 años?", options: ["$(0,82)^2$", "$(0,82)^3$", "$(0,82)^4$", "$(0,82)^1$", "$(0,82)^0$"], correct: 1, explanation: "$f(3) = (0,82)^3$" },
            { text: "Una inversión de \$7.500 crece un 10% anual. ¿Cuánto tendrá después de 4 años?", options: ["$7.500 \\cdot (1,1)^3$", "$7.500 \\cdot (1,1)^4$", "$7.500 \\cdot (1,1)^5$", "$7.500 \\cdot (1,1)^2$", "$7.500 \\cdot (1,1)^1$"], correct: 1, explanation: "$f(4) = 7.500 \\cdot (1,1)^4$" },
            { text: "Un cultivo de 250 algas aumenta un 60% cada 2 días. ¿Cuántas algas habrá después de 6 días?", options: ["$250 \\cdot (1,6)^2$", "$250 \\cdot (1,6)^3$", "$250 \\cdot (1,6)^4$", "$250 \\cdot (1,6)^1$", "$250 \\cdot (1,6)^0$"], correct: 1, explanation: "6 días = 3 períodos. $f(3) = 250 \\cdot (1,6)^3$" },
            { text: "Una población de ciervos se reduce un 6% cada año. Si hay 1.800 ciervos inicialmente, ¿cuántos quedan después de 5 años?", options: ["$1.800 \\cdot (0,94)^4$", "$1.800 \\cdot (0,94)^5$", "$1.800 \\cdot (0,94)^6$", "$1.800 \\cdot (0,94)^3$", "$1.800 \\cdot (0,94)^2$"], correct: 1, explanation: "$f(5) = 1.800 \\cdot (0,94)^5$" },
            { text: "Una bacteria se duplica cada 4 horas. Si hay 200 bacterias a las 6:00 AM, ¿cuántas habrá a las 2:00 PM?", options: ["$200 \\cdot 2^1$", "$200 \\cdot 2^2$", "$200 \\cdot 2^3$", "$200 \\cdot 2^4$", "$200 \\cdot 2^0$"], correct: 1, explanation: "De 6:00 a 14:00 = 8 horas. Períodos = 8/4 = 2. $f(2) = 200 \\cdot 2^2$" },
            { text: "Una población de 3.500 habitantes aumenta un 3,5% anual. ¿Cuántos habitantes habrá después de 6 años?", options: ["$3.500 \\cdot (1,035)^5$", "$3.500 \\cdot (1,035)^6$", "$3.500 \\cdot (1,035)^7$", "$3.500 \\cdot (1,035)^4$", "$3.500 \\cdot (1,035)^3$"], correct: 1, explanation: "$f(6) = 3.500 \\cdot (1,035)^6$" },
            { text: "Una sustancia radiactiva se reduce a la octava parte cada 30 años. ¿Cuál es su factor de reducción por año?", options: ["$2^{-1/10}$", "$2^{-1/15}$", "$2^{-1/20}$", "$2^{-1/25}$", "$2^{-1/30}$"], correct: 0, explanation: "Se reduce a la octava parte = $(1/2)^3$ en 30 años, en 1 año: $(1/2)^{3/30} = 2^{-1/10}$" },
            { text: "Una población de 1.200 bacterias se reduce un 15% cada hora. ¿Cuántas bacterias quedan después de 2,5 horas? (expresado como potencia)", options: ["$1.200 \\cdot (0,85)^{2}$", "$1.200 \\cdot (0,85)^{2,5}$", "$1.200 \\cdot (0,85)^{3}$", "$1.200 \\cdot (0,85)^{1}$", "$1.200 \\cdot (0,85)^{4}$"], correct: 1, explanation: "$f(2,5) = 1.200 \\cdot (0,85)^{2,5}$" },
            { text: "Una inversión de \$22.000 aumenta un 7% anual. ¿Cuánto tendrá después de 8 años?", options: ["$22.000 \\cdot (1,07)^7$", "$22.000 \\cdot (1,07)^8$", "$22.000 \\cdot (1,07)^9$", "$22.000 \\cdot (1,07)^6$", "$22.000 \\cdot (1,07)^5$"], correct: 1, explanation: "$f(8) = 22.000 \\cdot (1,07)^8$" },
            { text: "Una bacteria se multiplica por 10 cada 90 minutos. Si hay 5 bacterias a las 9:00 AM, ¿cuántas habrá a las 12:00 PM?", options: ["$5 \\cdot 10^1$", "$5 \\cdot 10^2$", "$5 \\cdot 10^3$", "$5 \\cdot 10^4$", "$5 \\cdot 10^0$"], correct: 1, explanation: "De 9:00 a 12:00 = 3 horas = 180 min = 2 períodos. $f(2) = 5 \\cdot 10^2$" }
        ];

        function getRandomQuestions(pool, count) {
            const shuffled = [...pool];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled.slice(0, count);
        }

        let questions = [];
        let userAnswers = [];
        let testFinished = false;

        function renderIndicators() {
            const grid = document.getElementById('indicatorsGrid');
            grid.innerHTML = '';
            for (let i = 0; i < questions.length; i++) {
                const indicator = document.createElement('div');
                indicator.className = 'indicator';
                if (userAnswers[i] !== null) indicator.classList.add('answered');
                indicator.textContent = i + 1;
                indicator.addEventListener('click', (function(idx) {
                    return function() {
                        const slide = document.getElementById(`slide-${idx}`);
                        if (slide) slide.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    };
                })(i));
                grid.appendChild(indicator);
            }
        }

        function renderQuestions() {
            const container = document.getElementById('slidesContainer');
            container.innerHTML = '';
            for (let i = 0; i < questions.length; i++) {
                const q = questions[i];
                const slideDiv = document.createElement('div');
                slideDiv.className = 'slide';
                slideDiv.id = `slide-${i}`;
                slideDiv.innerHTML = `
                    <div class="question-card">
                        <div class="question-text">${i+1}. ${q.text}</div>
                        <div class="options" id="options-${i}">
                            ${q.options.map((opt, idx) => `
                                <div class="option" data-opt-index="${idx}">
                                    <input type="radio" name="q${i}" id="q${i}_opt${idx}" value="${idx}" ${userAnswers[i] === idx ? 'checked' : ''} ${testFinished ? 'disabled' : ''}>
                                    <label for="q${i}_opt${idx}">${String.fromCharCode(65+idx)}) ${opt}</label>
                                </div>
                            `).join('')}
                        </div>
                        <div class="slide-number">Pregunta ${i+1} de ${questions.length}</div>
                    </div>
                `;
                container.appendChild(slideDiv);
                renderKatexInElement(slideDiv);
                if (!testFinished) {
                    const radios = document.querySelectorAll(`input[name="q${i}"]`);
                    radios.forEach(radio => {
                        radio.addEventListener('change', (e) => {
                            if (!testFinished) {
                                userAnswers[i] = parseInt(e.target.value);
                                renderIndicators();
                            }
                        });
                    });
                }
            }
            // renderKatexInElement(container); // No es necesario, ya se hizo por cada slide
        }

        function calculateGrade(correctCount, total) {
            const percentCorrect = correctCount / total;
            if (percentCorrect <= 0.6) return 1 + (percentCorrect / 0.6) * 3;
            else return 4 + ((percentCorrect - 0.6) / 0.4) * 3;
        }

        function finishExam() {
            if (testFinished) return;
            testFinished = true;
            let correctCount = 0;
            const results = [];
            for (let i = 0; i < questions.length; i++) {
                const isCorrect = (userAnswers[i] === questions[i].correct);
                if (isCorrect) correctCount++;
                results.push({
                    question: questions[i].text,
                    userAnswer: userAnswers[i],
                    correctAnswer: questions[i].correct,
                    isCorrect: isCorrect,
                    explanation: questions[i].explanation,
                    options: questions[i].options
                });
            }
            const grade = calculateGrade(correctCount, questions.length);
            const gradeRounded = Math.round(grade * 10) / 10;
            const percentage = Math.round((correctCount / questions.length) * 100);
            const resultsContainer = document.getElementById('resultsContainer');
            resultsContainer.innerHTML = `
                <h2>📊 Resultados del Test</h2>
                <div class="score-box">
                    <p>✅ Respuestas correctas: ${correctCount} / ${questions.length}</p>
                    <p>📈 Porcentaje: ${percentage}%</p>
                    <h3>🎓 Nota: ${gradeRounded}</h3>
                    <p>${gradeRounded >= 4 ? '✨ APROBADO ✨' : '📚 REPROBADO - Sigue practicando 📚'}</p>
                </div>
                <div id="detailedResults"></div>
                <div class="action-buttons">
                    <button class="action-btn restart-btn" id="restartBtn"><i class="fas fa-sync-alt"></i> Reiniciar Test</button>
                    <a href="matematicas.html" class="action-btn math-btn"><i class="fas fa-arrow-left"></i> Volver a Matemáticas</a>
                    <a href="exponencial.html" class="action-btn exponencial-btn"><i class="fas fa-book-open"></i> Repasar Clase</a>
                </div>
            `;
            const detailedDiv = document.getElementById('detailedResults');
            for (let i = 0; i < results.length; i++) {
                const r = results[i];
                const resultDiv = document.createElement('div');
                resultDiv.className = `result-question ${r.isCorrect ? 'correct' : 'incorrect'}`;
                const userLetter = r.userAnswer !== null ? String.fromCharCode(65 + r.userAnswer) : '?';
                const correctLetter = String.fromCharCode(65 + r.correctAnswer);
                const userAnswerText = r.userAnswer !== null ? r.options[r.userAnswer] : 'No respondida';
                resultDiv.innerHTML = `
                    <strong>Pregunta ${i+1}:</strong> ${r.question}<br>
                    <span>📌 Tu respuesta: ${userLetter}) ${userAnswerText}</span><br>
                    <span>✅ Respuesta correcta: ${correctLetter}) ${r.options[r.correctAnswer]}</span>
                    ${!r.isCorrect ? `<div class="explanation">📖 <strong>Desarrollo correcto:</strong><br>${r.explanation}</div>` : '<div class="explanation">✓ ¡Respuesta correcta!</div>'}
                `;
                detailedDiv.appendChild(resultDiv);
                renderKatexInElement(resultDiv);
            }
            renderKatexInElement(resultsContainer);
            document.getElementById('resultsOverlay').style.display = 'block';
            document.getElementById('restartBtn').addEventListener('click', () => {
                location.reload();
            });
            for (let i = 0; i < questions.length; i++) {
                const radios = document.querySelectorAll(`input[name="q${i}"]`);
                radios.forEach(radio => radio.disabled = true);
            }
        }

        function initTest() {
            questions = getRandomQuestions(questionPool, 40); // Usar 10 para pruebas, cámbialo a 40
            userAnswers = new Array(questions.length).fill(null);
            testFinished = false;
            renderQuestions();
            renderIndicators();
        }

        let currentSlide = 0;
        function goToSlide(index) {
            const slides = document.querySelectorAll('.slide');
            if (index < 0) index = 0;
            if (index >= slides.length) index = slides.length - 1;
            currentSlide = index;
            slides[currentSlide]?.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        window.addEventListener('keydown', (e) => {
            if (!testFinished && document.getElementById('resultsOverlay').style.display !== 'block') {
                if (e.key === 'ArrowRight') {
                    e.preventDefault();
                    goToSlide(currentSlide + 1);
                }
                if (e.key === 'ArrowLeft') {
                    e.preventDefault();
                    goToSlide(currentSlide - 1);
                }
            }
        });

        document.getElementById('prevBtn').addEventListener('click', () => { if (!testFinished) goToSlide(currentSlide - 1); });
        document.getElementById('nextBtn').addEventListener('click', () => { if (!testFinished) goToSlide(currentSlide + 1); });
        document.getElementById('finishBtn').addEventListener('click', finishExam);

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const slides = Array.from(document.querySelectorAll('.slide'));
                    currentSlide = slides.indexOf(entry.target);
                }
            });
        }, { threshold: 0.5 });

        initTest();
        setTimeout(() => {
            const slides = document.querySelectorAll('.slide');
            slides.forEach(slide => observer.observe(slide));
        }, 100);
    </script>
