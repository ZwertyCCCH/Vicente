<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Física | Academia CienciaPlus</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0f172a;
            color: #f1f5f9;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .back-btn {
            display: inline-block;
            background: #1e293b;
            padding: 10px 24px;
            border-radius: 40px;
            color: #94a3b8;
            text-decoration: none;
            margin-bottom: 40px;
        }
        .back-btn:hover {
            background: #334155;
            color: white;
        }
        h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #f87171, #fca5a5);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 20px;
        }
        .placeholder {
            background: #1e293b;
            border-radius: 24px;
            padding: 60px 40px;
            text-align: center;
            border: 1px dashed #334155;
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← Volver al inicio</a>
        <h1>⚛️ Física</h1>
        <p>Aquí irán todas las clases y contenido de física.</p>
        <div class="placeholder">
            <p>📌 Espacio reservado para tus clases de Mecánica, Termodinámica, Electromagnetismo, etc.</p>
        </div>
    </div>
</body>
</html>
