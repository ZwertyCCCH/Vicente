<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma de Ciencias | Inicio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', system-ui, -apple-system, sans-serif;
            background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 1100px;
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(2px);
            border-radius: 48px;
            padding: 40px 30px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header {
            text-align: center;
            margin-bottom: 60px;
        }

        .header h1 {
            font-size: 3rem;
            background: linear-gradient(135deg, #c084fc, #60a5fa, #34d399);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
            margin-bottom: 12px;
        }

        .header p {
            color: #94a3b8;
            font-size: 1.1rem;
            font-weight: 400;
        }

        .subjects-grid {
            display: flex;
            justify-content: center;
            gap: 32px;
            flex-wrap: wrap;
        }

        .subject-card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            border-radius: 32px;
            padding: 40px 32px;
            width: 260px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.4);
        }

        .subject-card:hover {
            transform: translateY(-8px);
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(30, 41, 59, 0.9);
            box-shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.5);
        }

        .icon {
            font-size: 4.2rem;
            display: block;
            margin-bottom: 24px;
        }

        .subject-card h2 {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .matematicas h2 { color: #60a5fa; }
        .fisica h2 { color: #f87171; }
        .quimica h2 { color: #34d399; }

        .btn {
            display: inline-block;
            margin-top: 24px;
            padding: 10px 28px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 60px;
            color: #e2e8f0;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .subject-card:hover .btn {
            background: rgba(255, 255, 255, 0.15);
            color: white;
        }

        @media (max-width: 780px) {
            .container { padding: 30px 20px; }
            .header h1 { font-size: 2.2rem; }
            .subjects-grid { gap: 20px; }
            .subject-card { width: 220px; padding: 28px 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Academia CienciaPlus</h1>
            <p>Selecciona una materia para acceder a sus clases</p>
        </div>
        <div class="subjects-grid">
            <!-- Botón Matemáticas -->
            <div class="subject-card matematicas" onclick="location.href='matematicas.html'">
                <span class="icon">📐</span>
                <h2>Matemáticas</h2>
                <span class="btn">Acceder →</span>
            </div>

            <!-- Botón Física -->
            <div class="subject-card fisica" onclick="location.href='fisica.html'">
                <span class="icon">⚛️</span>
                <h2>Física</h2>
                <span class="btn">Acceder →</span>
            </div>

            <!-- Botón Química -->
            <div class="subject-card quimica" onclick="location.href='quimica.html'">
                <span class="icon">🧪</span>
                <h2>Química</h2>
                <span class="btn">Acceder →</span>
            </div>
        </div>
    </div>
</body>
</html>
