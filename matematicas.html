<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matemáticas | Academia CienciaPlus</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 8px 20px;
            border-radius: 40px;
            color: #94a3b8;
            text-decoration: none;
            margin-bottom: 40px;
            transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.9rem;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            color: white;
            transform: translateX(-5px);
        }

        h1 {
            font-size: 2.8rem;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 12px;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 1rem;
            margin-bottom: 50px;
            border-left: 3px solid #3b82f6;
            padding-left: 20px;
        }

        /* Topic Card único y elegante */
        .topic-card {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 32px 40px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .topic-card:hover {
            border-color: rgba(59, 130, 246, 0.3);
            background: rgba(30, 41, 59, 0.7);
            box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.4);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 28px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .icon {
            font-size: 2.8rem;
        }

        .card-header h2 {
            font-size: 1.8rem;
            font-weight: 600;
            background: linear-gradient(135deg, #f1f5f9, #cbd5e1);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .card-description {
            color: #94a3b8;
            margin-bottom: 32px;
            line-height: 1.6;
            font-size: 0.95rem;
        }

        .buttons-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 28px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .btn-class {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .btn-class:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.4);
        }

        .btn-exercises {
            background: rgba(255, 255, 255, 0.05);
            color: #e2e8f0;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .btn-exercises:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateY(-3px);
            border-color: rgba(245, 158, 11, 0.5);
        }

        @media (max-width: 640px) {
            .container { padding: 0 15px; }
            h1 { font-size: 2rem; }
            .topic-card { padding: 24px 20px; }
            .card-header h2 { font-size: 1.4rem; }
            .icon { font-size: 2.2rem; }
            .btn { padding: 10px 20px; font-size: 0.85rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">
            ← Volver al inicio
        </a>
        <h1>📐 Matemáticas</h1>
        <div class="subtitle">
            Selecciona un tema para comenzar tu aprendizaje
        </div>

        <!-- Único topic card: Potencias -->
        <div class="topic-card">
            <div class="card-header">
                <span class="icon">🔢</span>
                <h2>Potencias</h2>
            </div>
            <div class="card-description">
                Aprende la definición, propiedades y casos especiales de las potencias. 
                Luego practica con ejercicios interactivos.
            </div>
            <div class="buttons-container">
                <a href="potencias.html" class="btn btn-class">
                    📖 Ir a la clase
                </a>
                <a href="e-potencias.html" class="btn btn-exercises">
                    ✏️ Ir a ejercicios
                </a>
            </div>
        </div>
    </div>
</body>
</html>
